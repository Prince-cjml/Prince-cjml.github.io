<!doctype html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>绩点计算器</title>
	<style>
		body{font-family:Segoe UI, Roboto, Arial;max-width:900px;margin:24px auto;padding:0 16px;color:#222}
		h1{font-size:20px;margin-bottom:8px}
		.row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
		input[type="text"], input[type="number"], select{padding:6px 8px;border:1px solid #ccc;border-radius:4px}
		button{padding:6px 10px;border-radius:6px;border:1px solid #2b6cb0;background:#3182ce;color:white;cursor:pointer}
		button.secondary{background:#edf2f7;color:#111;border:1px solid #cbd5e0}
		table{width:100%;border-collapse:collapse;margin-top:12px}
		th,td{padding:8px;border:1px solid #e2e8f0;text-align:left}
		th{background:#f7fafc}
		.muted{color:#6b7280}
		.badge{display:inline-block;padding:2px 6px;border-radius:6px;background:#e2e8f0;font-size:12px}
		.result{margin-top:12px;padding:10px;border-radius:6px;background:#f1f5f9}
		.input-error{border:2px solid #e53e3e !important}
		.error-msg{color:#e53e3e;margin-top:6px}
	</style>
</head>
<body>
	<h1>绩点计算器</h1>

	<div>
		<div class="row">
			<input id="courseName" type="text" placeholder="课程名" style="flex:2" />
			<input id="courseScore" type="number" placeholder="百分制得分 (0-100)" min="0" max="100" style="width:180px" />
			<input id="courseCredits" type="number" placeholder="学分" min="0" step="0.5" style="width:100px" />
			<select id="courseType">
				<option value="normal">百分制</option>
				<option value="passfail">合格制（不计入）</option>
				<option value="exempt">免修（不计入）</option>
			</select>
			<button id="addBtn">添加课程</button>
			<button id="computeBtn" class="secondary">计算均绩</button>
			<button id="exportBtn" class="secondary">导出 CSV</button>
			<button id="importBtn" class="secondary" type="button" style="margin-left:6px">导入 CSV</button>
			<input id="importFile" type="file" accept="text/csv" style="display:none" />
		</div>

		<div id="msg" class="muted" style="margin-bottom:6px">添加课程后点击“计算均绩”。挂科（F)、合格制与免修不计入均绩。合格制使用下拉选择 P/F，免修显示 EX。</div>
		<div id="errorInfo" class="error-msg" style="display:none"></div>

		<table id="courseTable">
			<thead>
				<tr>
					<th>课程名</th>
					<th>得分</th>
					<th>学分</th>
					<th>类型</th>
					<th>绩点 (GPA)</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody></tbody>
		</table>

		<div id="output" class="result" style="display:none"></div>
	</div>

	<script>
		// 数据存储
		const courses = [];

		const els = {
			name: document.getElementById('courseName'),
			score: document.getElementById('courseScore'),
			credits: document.getElementById('courseCredits'),
			type: document.getElementById('courseType'),
			addBtn: document.getElementById('addBtn'),
			computeBtn: document.getElementById('computeBtn'),
			exportBtn: document.getElementById('exportBtn'),
			importFile: document.getElementById('importFile'),
			importBtn: document.getElementById('importBtn'),
			tbody: document.querySelector('#courseTable tbody'),
			output: document.getElementById('output'),
			msg: document.getElementById('msg')
		};

		function clearFieldErrors(){
			[els.name, els.score, els.credits, els.type].forEach(el => {
				el.classList.remove('input-error');
			});
			clearErrorMessage();
		}

		function showFieldErrors(errs){
			clearFieldErrors();
			const msgs = [];
			for(const k in errs){
				const el = ({name: els.name, score: els.score, credits: els.credits, type: els.type})[k];
				if(el) el.classList.add('input-error');
				msgs.push(errs[k]);
			}
			setErrorMessage(msgs.join('；'));
		}

		function setErrorMessage(msg){
			const d = document.getElementById('errorInfo');
			d.style.display = msg ? 'block' : 'none';
			d.textContent = msg || '';
		}

		function clearErrorMessage(){ setErrorMessage(''); }

		function validateCourseInput(values){
			const errors = {};
			const name = values.name.trim();
			const credits = values.credits.trim();
			const scoreRaw = values.score.trim();
			const type = values.type;

			if(!name) errors.name = '课程名不能为空';
			if(credits === '' || isNaN(credits) || Number(credits) <= 0) errors.credits = '学分需为大于0的数字';
			if(type === 'normal'){
				if(scoreRaw === '' || isNaN(scoreRaw) || Number(scoreRaw) < 0 || Number(scoreRaw) > 100){
					errors.score = '普通课程请输入 0-100 的得分';
				}
			}

			return {ok: Object.keys(errors).length === 0, errors, data: {name, scoreRaw, credits: Number(credits), type}};
		}

		function attemptAddCourse(){
			clearFieldErrors();
			const values = {name: els.name.value, score: els.score.value, credits: els.credits.value, type: els.type.value};
			const res = validateCourseInput(values);
			if(!res.ok){
				showFieldErrors(res.errors);
				return;
			}

			// validated
			const type = res.data.type;
			let scoreToStore = null;
			let passStatus = null;
			if(type === 'normal') scoreToStore = Number(res.data.scoreRaw);
			// push
			courses.push({name: res.data.name, score: scoreToStore, credits: Number(res.data.credits), type, pass: passStatus});
			els.name.value = '';
			els.score.value = '';
			els.credits.value = '';
			els.type.value = 'normal';
			clearFieldErrors();
			updateView();
		}

		// Enter key handling on inputs
		[els.name, els.score, els.credits].forEach(el => {
			el.addEventListener('keydown', (e) => {
				if(e.key === 'Enter'){
					e.preventDefault();
					attemptAddCourse();
				}
			});
		});


		function gpaFromScore(x){
			x = Number(x);
			if(isNaN(x) || x < 60) return null; // F or not counted
			// GPA = 4.0 - 3.0 * (100-x)^2 / 1600
			const v = 4.0 - 3.0 * Math.pow(100 - x, 2) / 1600;
			return Math.max(0, v);
		}

		function renderTable(sortedCourses){
			// sortedCourses: array to display
			els.tbody.innerHTML = '';
			sortedCourses.forEach((c, idx) => {
				const tr = document.createElement('tr');
				const gpa = gpaFromScore(c.score);
				// score display: for passfail/exempt show '-', otherwise show numeric
				const scoreDisplay = (c.type === 'normal') ? (c.score === null ? '-' : Number(c.score).toFixed(1)) : '-';
				// gpa display rules:
				// - normal: numeric GPA or F/— if <60
				// - passfail: show 'P' if passed, 'F' if failed, '待定' if no score
				// - exempt: show 'EX'
				let gpaDisplay = '';
				if(c.type === 'exempt'){
					gpaDisplay = '<span>EX</span>';
				} else if(c.type === 'passfail'){
					// placeholder - we'll render a select control below for passfail rows
					gpaDisplay = '';
				} else {
					gpaDisplay = (gpa === null) ? '<span class="muted">F/—</span>' : Number(gpa).toFixed(3);
				}

				tr.innerHTML = `
					<td>${escapeHtml(c.name || '')}</td>
					<td class="scoreCell" data-idx="${idx}" data-type="${c.type}">${scoreDisplay}</td>
					<td>${Number(c.credits)}</td>
					<td>${typeLabel(c.type)}</td>
					<td class="gpaCell" data-idx="${idx}" data-type="${c.type}">${gpaDisplay}</td>
					<td><button data-idx="${idx}" class="del">删除</button></td>
				`;
				els.tbody.appendChild(tr);

				// Inline edit: allow editing only for normal courses
				const scoreCell = tr.querySelector('.scoreCell');
				const gpaCell = tr.querySelector('.gpaCell');
				const attachEdit = (cell) => {
					cell.addEventListener('click', (ev) => {
						// only normal courses editable now
						if(c.type !== 'normal') return;
						// avoid creating multiple inputs
						if(cell.querySelector('input')) return;

						const input = document.createElement('input');
						input.type = 'number';
						input.min = 0;
						input.max = 100;
						input.placeholder = '0-100';
						input.style.width = '80px';
						input.className = 'inlineScore';
						// prefill for normal if score exists
						if(c.score !== null) input.value = c.score;
						cell.innerHTML = '';
						cell.appendChild(input);
						input.focus();

						const finish = () => {
							const val = input.value.trim();
							if(val === ''){ alert('普通课程需填写得分'); input.focus(); return; }
							const num = Number(val);
							if(isNaN(num) || num < 0 || num > 100){ alert('请输入 0-100 的有效得分'); input.focus(); return; }
							const target = sortedCourses[idx];
							const origIndex = courses.indexOf(target);
							if(origIndex >= 0){ courses[origIndex].score = num; }
							updateView();
						};

						input.addEventListener('blur', finish);
						input.addEventListener('keydown', (e)=>{
							if(e.key === 'Enter'){ finish(); }
							else if(e.key === 'Escape'){ updateView(); }
						});
					});
				};

				if(scoreCell) attachEdit(scoreCell);

				// For passfail rows, render a select (P/F/待定) in the GPA cell
				if(c.type === 'passfail' && gpaCell){
					const sel = document.createElement('select');
					const optEmpty = document.createElement('option'); optEmpty.value = ''; optEmpty.text = '待定';
					const optP = document.createElement('option'); optP.value = 'P'; optP.text = 'P';
					const optF = document.createElement('option'); optF.value = 'F'; optF.text = 'F';
					sel.appendChild(optEmpty);
					sel.appendChild(optP);
					sel.appendChild(optF);
					// ensure course has a .pass field
					if(typeof c.pass === 'undefined') c.pass = null;
					sel.value = c.pass === null ? '' : c.pass;
					sel.addEventListener('change', () => {
						const val = sel.value;
						const target = sortedCourses[idx];
						const origIndex = courses.indexOf(target);
						if(origIndex >= 0){
							courses[origIndex].pass = val === '' ? null : val;
							// keep score null for passfail
							courses[origIndex].score = null;
						}
						updateView();
					});
					gpaCell.innerHTML = '';
					gpaCell.appendChild(sel);
				}
			});

			// attach delete handlers
			els.tbody.querySelectorAll('.del').forEach(btn => {
				btn.addEventListener('click', e => {
					const i = Number(btn.getAttribute('data-idx'));
					// find and remove the corresponding course in the original array by identity
					const target = sortedCourses[i];
					const origIndex = courses.indexOf(target);
					if(origIndex >= 0) courses.splice(origIndex, 1);
					updateView();
				});
			});
		}

		function typeLabel(t){
			if(t === 'normal') return '百分制';
			if(t === 'passfail') return '合格制';
			return '免修';
		}

		function escapeHtml(s){
			return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[ch]);
		}

		function updateView(){
			// Custom sort:
			// 0: exempt (top)
			// 1: normal with GPA (passed normal courses), sorted by GPA desc
			// 2: passfail (合格制)
			// 3: normal failing (挂科) (bottom)
			const copy = courses.slice();
			copy.sort((a,b)=>{
				function rank(c){
					if(c.type === 'exempt') return 0;
					const g = gpaFromScore(c.score);
					if(c.type === 'normal' && g !== null) return 1;
					if(c.type === 'passfail') return 2;
					return 3;
				}
				const ra = rank(a), rb = rank(b);
				if(ra !== rb) return ra - rb;
				// same rank: if rank 1 sort by GPA desc
				if(ra === 1){
					return gpaFromScore(b.score) - gpaFromScore(a.score);
				}
				// otherwise keep insertion order
				return 0;
			});
			renderTable(copy);
		}

		els.addBtn.addEventListener('click', attemptAddCourse);


		els.computeBtn.addEventListener('click', ()=>{
			if(courses.length === 0){ alert('请先添加至少一门课程'); return; }

			// compute weighted average excluding: type != normal OR score<60
			let totalCredits = 0;
			let weighted = 0;
			let count = 0;

			courses.forEach(c => {
				if(c.type !== 'normal') return; // exclude 合格制、免修
				const g = gpaFromScore(c.score);
				if(g === null) return; // exclude F
				totalCredits += Number(c.credits);
				weighted += g * Number(c.credits);
				count += 1;
			});

			if(totalCredits === 0){
				els.output.style.display = 'block';
				els.output.innerHTML = '<strong>无有效课程用于计算均绩（所有课程均为挂科/合格制/免修）。</strong>';
				updateView();
				return;
			}

			const avg = weighted / totalCredits;

			els.output.style.display = 'block';
			els.output.innerHTML = `
				<div><strong>平均绩点 (加权)：</strong> ${avg.toFixed(3)}</div>
				<div class="muted">合并学分：${totalCredits}，计入门数：${count}</div>
			`;

			updateView();
		});

		// CSV helpers
		function quoteCsv(s){
			if(s == null) return '';
			const str = String(s);
			if(/[,"\n\r]/.test(str)) return '"' + str.replace(/"/g,'""') + '"';
			return str;
		}

		function exportCSV(){
			const header = ['课程名','得分','学分','类型','P/F'];
			const lines = [header.map(quoteCsv).join(',')];
			courses.forEach(c => {
				lines.push([
					c.name,
					c.score === null ? '' : c.score,
					c.credits,
					c.type,
					c.pass === null ? '' : c.pass
				].map(quoteCsv).join(','));
			});
			const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
			const url = URL.createObjectURL(blob);
			const a = document.createElement('a');
			a.href = url;
			a.download = 'courses.csv';
			document.body.appendChild(a);
			a.click();
			a.remove();
			URL.revokeObjectURL(url);
		}

		function parseCSV(text){
			const rows = [];
			let cur = [];
			let i = 0;
			let field = '';
			let inQuotes = false;
			while(i < text.length){
				const ch = text[i];
				if(inQuotes){
					if(ch === '"'){
						if(text[i+1] === '"'){ field += '"'; i+=2; continue; }
						inQuotes = false; i++; continue;
					}
					field += ch; i++; continue;
				}
				if(ch === '"'){ inQuotes = true; i++; continue; }
				if(ch === ','){ cur.push(field); field = ''; i++; continue; }
				if(ch === '\r'){ i++; continue; }
				if(ch === '\n'){ cur.push(field); rows.push(cur); cur = []; field = ''; i++; continue; }
				field += ch; i++;
			}
			if(inQuotes){ /* malformed but try */ }
			if(field !== '' || cur.length > 0) cur.push(field);
			if(cur.length > 0) rows.push(cur);
			return rows;
		}

		// wire export/import
		if(els.exportBtn){
			els.exportBtn.addEventListener('click', ()=>{
				exportCSV();
			});
		}
		if(els.importBtn){
			els.importBtn.addEventListener('click', ()=>{
				if(els.importFile) els.importFile.click();
			});
		}
		if(els.importFile){
			els.importFile.addEventListener('change', (ev)=>{
				const f = ev.target.files && ev.target.files[0];
				if(!f) return;
				const reader = new FileReader();
				reader.onload = (e) => {
					const txt = e.target.result;
					const rows = parseCSV(txt);
					// assume first row is header if contains '课程名'
					let start = 0;
					if(rows.length && rows[0].some(cell => /课程名/.test(cell))) start = 1;
					let imported = 0; let failed = 0; const failMsgs = [];
					for(let r = start; r < rows.length; r++){
						const row = rows[r];
						const name = (row[0] || '').trim();
						const score = (row[1] || '').trim();
						const credits = (row[2] || '').trim();
						const type = (row[3] || 'normal').trim() || 'normal';
						const pass = (row[4] || '').trim() || null;
						const v = validateCourseInput({name, score, credits, type});
						if(!v.ok){ failed++; failMsgs.push(`第${r+1}行: ${Object.values(v.errors).join(';')}`); continue; }
						let scoreToStore = null;
						if(type === 'normal') scoreToStore = Number(score);
						courses.push({name: v.data.name, score: scoreToStore, credits: Number(v.data.credits), type, pass: pass});
						imported++;
					}
					updateView();
					let msg = `已导入 ${imported} 条记录`;
					if(failed) msg += `，跳过 ${failed} 条（示例：${failMsgs.slice(0,3).join('；')}）`;
					setErrorMessage(msg);
				};
				reader.readAsText(f, 'utf-8');
			});
		}

		// initial render
		updateView();
	</script>
</body>
</html>
